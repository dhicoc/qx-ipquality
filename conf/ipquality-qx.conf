# Quantumult X · 节点 IP 质量检测（仅 IP）
# 脚本路径请改成你可访问的地址。

[task_local]
# 工具页手动运行（跟随 App 默认路由）
event-interaction https://raw.githubusercontent.com/dhicoc/qx-ipquality/master/src/ipquality-qx.js, tag=节点IP质量检测, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png, enabled=true

# 指定策略组/节点（名称须与 QX 中完全一致）
# event-interaction https://raw.githubusercontent.com/dhicoc/qx-ipquality/master/src/ipquality-qx.js, tag=IP检测·香港, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png, enabled=true, argument=policy=香港&mask=0

# 参数
#   policy=节点或策略组名   出口探测走该策略；留空=默认路由
#   mask=1|0                通知里隐藏 IP 后两段，默认 0
